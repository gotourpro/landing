<section class="hero-two relative">

  <div class="container">

    <div class="flex flex-col lg:flex-row items-center -mx-3">

      <div class="w-full lg:w-7/12 px-3">

        <div class="hero-two__content">

          <h5
            class="hero-two__sub-title  text-[#F8931F]!"
            [appTextAnimation]="'left'"
            translationKey="components.homeHero.subtitlePrefix"
            [delay]="100"
            [stagger]="15"
            [once]="true"
            [duration]="1200"
          >
          </h5>

          <h2
            class="hero-two__title dark:text-surface-0!"
            [appTextAnimation]="'down'"
            translationKey="components.homeHero.title"
            [delay]="350"
            [stagger]="25"
            [once]="true"
            [duration]="1500"
          >
          </h2>

          <p
            class="hero-one__text sub-title dark:text-surface-0!"
            [appTextAnimation]="'left'"
            translationKey="components.homeHero.description"
            [delay]="700"
            [stagger]="5"
            [once]="true"
            [duration]="1200"
          >
          </p>

          <div class="mt-8 hidden lg:flex flex-wrap gap-4">

            <p-button
              icon="pi pi-arrow-right"
              iconPos="right"
              [label]="'components.homeHero.contactUs' | translate"
              size="large"
              routerLink="/contact"
              [rounded]="true"
            />

          </div>

        </div>

      </div>

      <div
        class="hero-three__image "
        style="visibility: visible; animation-duration: 1500ms; animation-delay: 500ms; animation-name: fadeInRight;"
      >
        <div class="hero-three__image__item">

          <img
            [src]="image.getImage('backgrounds/hero-3-2')"
            [srcset]="image.getSrcSet('backgrounds/hero-3-2')"
            sizes="(max-width: 992px) 100vw, 100vw"
            alt="Hero image"
            fetchpriority="high"
            decoding="async"
          />

        </div>
        <div class="hero-three__image__shape">

          <img
            [src]="image.getImage('backgrounds/hero-shape')"
            [srcset]="image.getSrcSet('backgrounds/hero-shape')"
            sizes="160px"
            alt=""
            loading="lazy"
            decoding="async"
          />
        </div>
