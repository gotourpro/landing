                        <ng-template
                            #item
                            let-item
                            let-root="root"
                        >
                            <a
                                #menuLink
                                *ngIf="root"
                                pRipple
                                [routerLink]="item.route"
                                [routerLinkActiveOptions]="{ exact: true }"
                                routerLinkActive="active-menu-item"
                                #rla="routerLinkActive"
                                (rla.isActiveChange)="onLinkActiveChange($event, menuLink)"
                                class="root-menu-link flex h-full items-center cursor-pointer overflow-hidden relative font-medium text-gray-700"
                                [ngClass]="styleClassColor"
                            >

                                <span class="ml-2 mr-2">{{ item.label }}</span>
                                <i
                                    *ngIf="item.items"
                                    [ngClass]="['ml-auto pi', root ? 'pi-angle-down' : 'pi-angle-right']"
                                ></i>
                            </a>


                            <a
                                [routerLink]="item.route"
                                routerLinkActive="active-menu-item"
                                *ngIf="!root"
                                class="flex items-center p-4 cursor-pointer font-medium"
                            >


                                <span class="ml-2 mr-2">{{ item.label}}</span>
                                <i
                                    *ngIf="item.items"
                                    [ngClass]="['ml-auto pi', root ? 'pi-angle-down' : 'pi-angle-right']"
                                ></i>

                            </a>



                        </ng-template>
                        <ng-template #end>
                            <div
                                class="flex items-center gap-2"
                                (mouseenter)="clearIndicator()"
                                (mouseleave)="resetIndicator()"
                            >




                                <app-configurator />

                                <app-language-control [styleClass]="styleClassEnd" />



                                <p-button
                                    *ngIf="!isMobile"
                                    icon="pi pi-comment"
                                    [styleClass]="twMerge(
    '[&_.p-button-label]:hidden sm:[&_.p-button-label]:inline-block'
  )"
                                    routerLink="/contact"
                                    [label]="'components.homeHero.contactUs' | translate"
                                    [rounded]="true"
                                />


                                <p-button
                                    *ngIf="isMobile"
                                    icon="pi pi-bars"
                                    size="large"
                                    (click)="openMobileMenu()"
                                    [rounded]="true"
                                    [text]="true"
                                />


                            </div>
                        </ng-template>



                    </p-menubar>
                    <div
                        [hidden]="isMobile"
                        #indicator
                        class="menu-indicator"
                    ></div>
                </div>
            </div>
        </div>
    </div>
</div>
