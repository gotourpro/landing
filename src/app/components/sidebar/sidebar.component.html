<div class="layout-topbar flex! h-[60px]">
  <div class="topbar-start">
    <p-button
      #menubutton
      [rounded]="true"
      class="max-lg:block hidden"
      (click)="onMenuButtonClick()"
      badgeSeverity="contrast"
      [text]="true"
    >
      <i class="text-xl {{ layoutService.isMenuActive() ? 'pi pi-times' : 'pi pi-bars' }}"></i>
    </p-button>
  </div>

      (mouseleave)="onMouseLeave()"

          class="layout-sidebar-anchor p-link z-2 mb-2"
          type="button"

        ></button>

      <div
        #menuContainer
        class="layout-menu-container"
      >
        <!-- <app-menu></app-menu> -->
      </div>
    </div>
  </div>

  <div class="topbar-end flex items-center gap-4">
    <app-date-time></app-date-time>
    <div
      (click)="onClickUser()"
      class="flex align-items-center gap-2"
      style="cursor: pointer;"
    >
      <p-avatar
        [image]="avatarImage"
        [label]="avatarImage
        ? undefined
        : ((userName?.slice(0,1) ?? 'A') | uppercase)"
        styleClass="mr-2"
        [style]="{
        'vertical-align': 'middle',
        'background-color': '#ece9fc',
        color: '#2a1261',
        width: '2.3rem',
        height: '2.3rem'
      }"
        shape="circle"
      >
      </p-avatar>
      <span class="text-primary">

      </span>
    </div>
  </div>
</div>
