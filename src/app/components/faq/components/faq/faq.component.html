<animated-container>
    <app-menu [styleClass]="'relative! w-full! p-0! border-0 rounded-none! bg-transparent'"></app-menu>
    <div class="pt-20">
        <app-header [title]="'components.faq.title' | translate">
            {{ 'components.faq.description' | translate }}

        </app-header>
        <animated-container>

            <section class="faq-section">
                <div class="container">


                    <p-accordion
                        class="flex flex-col gap-4"
                        expandIcon="pi pi-plus"
                        collapseIcon="pi pi-minus"
                    >
                        <p-accordion-panel
                            *ngFor="let item of faqData"
                            [value]="localization.getText(item.title)"
                            class="rounded-3xl px-6 overflow-hidden shadow-stroke dark:shadow-none border-0! dark:border! dark:border-white/12"
                        >
                            <p-accordion-header class="py-6! bg-surface-0! dark:bg-surface-950!">
                                <h3 class="text-xl! m-0! font-semibold text-surface-950 dark:text-surface-0! flex-1">
                                    {{ localization.getText(item.title) }}
                                </h3>
                            </p-accordion-header>
                            <p-accordion-content>
                                <p class="pb-6 text-lg font-medium text-surface-500 dark:text-white/64">
                                    {{ localization.getText(item.content) }}
                                </p>
                            </p-accordion-content>
                        </p-accordion-panel>
                    </p-accordion>
                </div>
            </section>

        </animated-container>
        <app-footer />
    </div>
</animated-container>
