<map-advanced-marker
    *ngIf="shouldShowCenterMarker ()"
    [position]="isZooming ? lastValidCenter : centerMarkerPosition"
    [content]="centerMarkerContent"
    [gmpDraggable]="false"
>
    <div #centerMarkerContent>
        <div
            class="marker-position"
            style="left: calc(50% + 164px); top: calc(50% + 4px);"
        >
            <div
                class="marker-pin"
                [ngClass]="markerState"
            >
                <div class="marker-label"></div>
            </div>
        </div>
    </div>
</map-advanced-marker>

<map-advanced-marker
    *ngFor="let m of markers; trackBy: trackBy"
    [position]="m.position"
    [content]="m.content"
    [gmpDraggable]="true"
    (mapDragend)="onMarkerDragEnd($event, m)"
></map-advanced-marker>

<map-directions-renderer
    *ngFor="let dr of directionsRenderers; let idx = index"
    [directions]="dr.directions"
    [options]="dr.options"
    (mapClick)="selectRoute(idx)"
></map-directions-renderer>
